<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF8F5E"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(255,107,53,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="200" fill="none" stroke="rgba(255,107,53,0.08)" stroke-width="1"/>
  <circle cx="1100" cy="100" r="150" fill="none" stroke="rgba(255,107,53,0.05)" stroke-width="0.5"/>
  <circle cx="100" cy="530" r="180" fill="none" stroke="rgba(255,107,53,0.06)" stroke-width="1"/>

  <!-- Decorative grid dots -->
  <g fill="rgba(255,255,255,0.03)">
    <circle cx="200" cy="100" r="2"/><circle cx="400" cy="80" r="1.5"/>
    <circle cx="600" cy="120" r="2"/><circle cx="800" cy="90" r="1.5"/>
    <circle cx="1000" cy="110" r="2"/><circle cx="300" cy="550" r="1.5"/>
    <circle cx="500" cy="570" r="2"/><circle cx="700" cy="540" r="1.5"/>
    <circle cx="900" cy="560" r="2"/><circle cx="1100" cy="530" r="1.5"/>
  </g>

  <!-- Left side: Lightning bolt icon -->
  <g transform="translate(160, 315)" filter="url(#glow)">
    <path d="M-40,-100 L60,-20 L10,0 L50,80 L-50,0 L0,-20 Z" fill="url(#boltGrad)" stroke="#FF8F5E" stroke-width="0.5"/>
  </g>

  <!-- Right side: Main content -->
  <g transform="translate(380, 0)">
    <!-- Badge -->
    <rect x="0" y="150" width="200" height="32" rx="16" fill="url(#accentGrad)" opacity="0.9" filter="url(#shadow)"/>
    <text x="100" y="172" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="14" fill="#fff" letter-spacing="2">⚡ ENERGY INDEX</text>

    <!-- Main title - English -->
    <text x="0" y="225" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="42" fill="#ffffff" letter-spacing="1">Global Leaderboard</text>

    <!-- Subtitle -->
    <text x="0" y="275" font-family="Arial, Helvetica, sans-serif" font-weight="300" font-size="24" fill="#a0a0b0" letter-spacing="0.5">Gyroball Fitness Ranking Platform</text>

    <!-- Chinese title -->
    <text x="0" y="335" font-family="'PingFang SC', 'Microsoft YaHei', Arial, sans-serif" font-weight="500" font-size="20" fill="#808090" letter-spacing="1">摇跑活力指数排行榜</text>

    <!-- Divider -->
    <rect x="0" y="365" width="80" height="3" rx="1.5" fill="url(#accentGrad)"/>

    <!-- Stats row -->
    <g transform="translate(0, 405)">
      <rect x="0" y="0" width="140" height="52" rx="8" fill="rgba(255,107,53,0.1)" stroke="rgba(255,107,53,0.2)" stroke-width="1"/>
      <text x="70" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#FF6B35">1 MIN</text>
      <text x="70" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#808090">Quick Test</text>

      <rect x="155" y="0" width="140" height="52" rx="8" fill="rgba(255,107,53,0.1)" stroke="rgba(255,107,53,0.2)" stroke-width="1"/>
      <text x="225" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#FF6B35">ALL AGES</text>
      <text x="225" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#808090">6 Age Groups</text>

      <rect x="310" y="0" width="140" height="52" rx="8" fill="rgba(255,107,53,0.1)" stroke="rgba(255,107,53,0.2)" stroke-width="1"/>
      <text x="380" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#FF6B35">GLOBAL</text>
      <text x="380" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#808090">World Rankings</text>
    </g>

    <!-- URL -->
    <text x="0" y="510" font-family="Arial, sans-serif" font-weight="500" font-size="14" fill="#606070" letter-spacing="1">bazu-ranking.com</text>
  </g>
</svg>
